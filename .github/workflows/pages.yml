name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx puppeteer browsers install chrome
      - run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify IndexNow
        run: |
          curl -fsS -m 30 -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json' \
            -d '{"host":"gaiareact.com","key":"fd715526058a4dc088287170bafcfd65","keyLocation":"https://gaiareact.com/fd715526058a4dc088287170bafcfd65.txt","urlList":["https://gaiareact.com/","https://gaiareact.com/why/","https://gaiareact.com/features/","https://gaiareact.com/get-started/","https://gaiareact.com/consulting/","https://gaiareact.com/about/"]}' || true
